<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký nhiều bước</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="form-container">
    <div class="progress-wrapper">
        <div class="progress-info">
            <span>Bước <span id="current-step-text">1</span>/3</span>
            <span id="percent-text">33%</span>
        </div>
        <div class="progress-track">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
    </div>

    <form id="multi-step-form">
        <div class="step active">
            <h2>Thông tin cá nhân</h2>
            <div class="form-group">
                <label>Họ tên</label>
                <input type="text" id="fullName" placeholder="Nguyễn Văn A">
            </div>
            <div class="form-group">
                <label>Ngày sinh</label>
                <input type="date" id="dob">
            </div>
            <div class="form-group">
                <label>Giới tính</label>
                <select id="gender">
                    <option value="">-- Chọn --</option>
                    <option value="Nam">Nam</option>
                    <option value="Nữ">Nữ</option>
                </select>
            </div>
        </div>

        <div class="step">
            <h2>Thông tin tài khoản</h2>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="example@gmail.com">
            </div>
            <div class="form-group">
                <label>Mật khẩu (>= 6 ký tự)</label>
                <input type="password" id="password">
            </div>
            <div class="form-group">
                <label>Xác nhận mật khẩu</label>
                <input type="password" id="confirmPassword">
                <small class="error-msg" id="pwd-error"></small>
            </div>
        </div>

        <div class="step">
            <h2>Xác nhận thông tin</h2>
            <div class="summary-box" id="summary-info"></div>
        </div>

        <div class="button-group">
            <button type="button" id="prevBtn" class="btn btn-prev">Quay lại</button>
            <button type="button" id="nextBtn" class="btn btn-next" disabled>Tiếp theo</button>
            <button type="submit" id="submitBtn" class="btn btn-submit">Hoàn tất</button>
        </div>
    </form>
</div>

<script src="script.js"></script>
</body>
</html>
